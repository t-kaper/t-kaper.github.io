<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-label="workshop notes cover">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f14"/>
      <stop offset="1" stop-color="#101720"/>
    </linearGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="60%">
      <stop offset="0" stop-color="#9b7bff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#9b7bff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1f2a36" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="1600" height="700" fill="url(#bg2)"/>
  <rect width="1600" height="700" fill="url(#grid2)" opacity="0.5"/>
  <rect width="1600" height="700" fill="url(#glow2)"/>

  <g transform="translate(120 130)" font-family="JetBrains Mono, ui-monospace, monospace">
    <text x="0" y="0" fill="#9b7bff" font-size="22" letter-spacing="8">// LOG_002</text>
    <text x="0" y="120" fill="#f3f7fb" font-size="110" font-weight="700" letter-spacing="-2">workshop notes</text>
    <text x="0" y="200" fill="#7f92a6" font-size="28">drafts · sketches · build log</text>
  </g>

  <g transform="translate(120 420)" stroke="#9b7bff" stroke-width="2" fill="none" opacity="0.7">
    <rect x="0" y="0" width="180" height="110" rx="6"/>
    <rect x="200" y="0" width="180" height="110" rx="6"/>
    <rect x="400" y="0" width="180" height="110" rx="6"/>
    <line x1="20" y1="30" x2="160" y2="30"/>
    <line x1="20" y1="50" x2="120" y2="50"/>
    <line x1="20" y1="70" x2="140" y2="70"/>
    <line x1="220" y1="30" x2="360" y2="30" stroke="#57e3ff"/>
    <line x1="220" y1="50" x2="320" y2="50" stroke="#57e3ff"/>
    <line x1="420" y1="30" x2="560" y2="30" stroke="#89ffb0"/>
    <line x1="420" y1="50" x2="500" y2="50" stroke="#89ffb0"/>
  </g>

  <g transform="translate(1180 150)" opacity="0.85">
    <circle cx="120" cy="120" r="100" fill="none" stroke="#9b7bff" stroke-width="2" opacity="0.5"/>
    <circle cx="120" cy="120" r="60" fill="none" stroke="#57e3ff" stroke-width="2" opacity="0.7"/>
    <circle cx="120" cy="120" r="20" fill="#57e3ff" opacity="0.85"/>
    <text x="120" y="280" text-anchor="middle" fill="#7f92a6" font-family="JetBrains Mono, monospace" font-size="14">node.beacon</text>
  </g>
</svg>
